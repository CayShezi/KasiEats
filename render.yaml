services:
  - name: kasirunner
    type: web
    runtime: node
    plan: starter
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /api/ready
    autoDeployTrigger: commit
    disk:
      name: app-data
      mountPath: /opt/render/project/src/storage
      sizeGB: 10
    envVars:
      - key: NODE_VERSION
        value: 24.14.1
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATA_DIR
        value: /opt/render/project/src/storage
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
